<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="description" content="MTQ Perfo — Programme de transformation 8 semaines" />
    <title>MTQ PERFO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        font-family: 'DM Sans', system-ui, sans-serif;
        background: #0A0A0A;
        color: #FFFFFF;
        -webkit-font-smoothing: antialiased;
      }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes glowPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: #0A0A0A; }
      ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #00E676; }
      .nav-tabs::-webkit-scrollbar { display: none; }
      .nav-tabs { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
